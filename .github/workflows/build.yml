name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "/usr/local/lib/android/sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/platform-tools" >> $GITHUB_PATH
          echo "/usr/local/lib/android/sdk/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Accept SDK Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip -O gradle.zip
          unzip -q gradle.zip -d $HOME/gradle-install
          GRADLE_BIN=$HOME/gradle-install/gradle-8.0/bin/gradle
          chmod +x $GRADLE_BIN
          PROJECT_DIR=$(dirname $(find . -name "settings.gradle" | head -1))
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          cd $PROJECT_DIR
          $GRADLE_BIN wrapper --gradle-version 8.0
          chmod +x gradlew

      - name: Build Debug APK
        run: |
          cd $PROJECT_DIR
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OnboardingApp-debug
          path: "**/app/build/outputs/apk/debug/app-debug.apk"
